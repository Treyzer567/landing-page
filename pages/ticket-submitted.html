<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Submitted</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: #0a0a0f;
    color: #e6e6e6;
    font-family: 'Segoe UI', Roboto, sans-serif;
}

:root {
    --accent: #5865f2;
    --success: #4CAF50;
    --text-dim: #b3b3b3;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem 1rem;
}

.card {
    max-width: 520px;
    width: 100%;
    background: linear-gradient(145deg,
        rgba(88, 101, 242, 0.12),
        rgba(114, 137, 218, 0.06)
    );
    border: 1px solid rgba(88, 101, 242, 0.25);
    border-radius: 24px;
    padding: 2rem;
    text-align: center;
    backdrop-filter: blur(40px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeInUp 0.4s ease;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.icon {
    font-size: 3rem;
    margin-bottom: 0.5rem;
}

h1 {
    color: var(--success);
    margin: 0.5rem 0;
    font-size: 1.6rem;
}

p {
    color: var(--text-dim);
    font-size: 0.9rem;
    line-height: 1.6;
}

.ticket-id {
    margin: 1.5rem 0;
    padding: 0.75rem;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: #ffffff;
}

.actions {
    margin-top: 1.5rem;
    display: flex;
    justify-content: center;
}

.btn {
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    border: 1px solid rgba(88, 101, 242, 0.4);
    background: rgba(88, 101, 242, 0.2);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.2s ease;
}

.btn:hover {
    background: rgba(88, 101, 242, 0.35);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">✅</div>
    <h1>Ticket Submitted</h1>

    <p>
        Your support request has been successfully submitted.<br>
        Our team has received your ticket and will respond as soon as possible.
    </p>

    <div class="ticket-id" id="ticketId">
        Ticket ID: —
    </div>

    <p>
        Please save this ticket ID for reference.
    </p>

    <div class="actions">
        <a href="ticket-form.html" class="btn">Submit Another Ticket</a>
    </div>
</div>

<script>
/* Read ticket ID from URL */
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

if (id) {
    document.getElementById('ticketId').textContent = `Ticket ID: ${id}`;
}
</script>

</body>
</html>
