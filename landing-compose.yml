---
version: "3.8"
services:

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    networks:
      - media-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - /path/to/configs/homarr-config/appdata:/appdata
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - SECRET_ENCRYPTION_KEY=your_64_char_hex_encryption_key_here
    ports:
      - '8118:7575'

  homarr-pages:
    image: nginx:alpine
    container_name: homarr-pages
    ports:
      - "8119:80"
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - ACCESS_TOKEN=your_hesk_api_access_token
      - TICKET_URL=http://your-server-ip:8140
      - HESK_URL=http://your-server-ip:8140
      - SIGNON_URL=http://your-server-ip:8121
      - SCRIPT_RUNNER_URL=http://your-server-ip:8141
      - PLAYLIST_BACKEND_URL=http://your-server-ip:8120
      - HESK_MIDDLEWARE_URL=http://your-server-ip:3001
    networks:
      - media-net
    volumes:
      - /path/to/apps/landing-page-simple/pages:/usr/share/nginx/html:rw
      - /path/to/apps/landing-page-simple/assets:/usr/share/nginx/html/assets
    command: >
      /bin/sh -c "
        apk add --no-cache curl &&
        CATEGORIES=$$(curl -s '${HESK_URL}/api/index.php?key=${ACCESS_TOKEN}&action=categories' 2>/dev/null || echo '[{\"id\":1,\"name\":\"General Support\",\"priority\":3}]') &&
        echo \"window.CONFIG_LOADED=true;window.ACCESS_TOKEN='$${ACCESS_TOKEN}';window.HESK_URL='$${HESK_URL}';window.HESK_CATEGORIES=$${CATEGORIES};window.SIGNON_URL='$${SIGNON_URL}';window.SCRIPT_RUNNER_URL='$${SCRIPT_RUNNER_URL}';window.PLAYLIST_BACKEND_URL='$${PLAYLIST_BACKEND_URL}';window.HESK_MIDDLEWARE_URL='$${HESK_MIDDLEWARE_URL}';\" > /usr/share/nginx/html/config.js &&
        nginx -g 'daemon off;'
      "

  playlist-importer-backend:
    image: python:3.11-slim
    container_name: playlist-importer-backend
    working_dir: /app
    ports:
      - "8120:5000"
    restart: unless-stopped
    # Mount the backend code directly into the container
    volumes:
      - /path/to/apps/landing-page-simple/backend/playlist-importer:/app
      - /path/to/music-downloads:/music_downloads
      - /path/to/music-destinations:/music_destinations
    # Install requirements and start the app every time it boots
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             gunicorn --bind 0.0.0.0:5000 app:app"
    environment:
      # --- Jellyfin Credentials ---
      JELLYFIN_URL: "http://your-server-ip:8096"
      JELLYFIN_API_KEY: "your_jellyfin_api_key"

      # --- Spotify Credentials ---
      SPOTIFY_CLIENT_ID: "your_spotify_client_id"
      SPOTIFY_CLIENT_SECRET: "your_spotify_client_secret"

      # --- Apple Music Credentials ---
      # This is the secret private key content used to sign JWTs (JSON Web Tokens)
      APPLE_MUSIC_PRIVATE_KEY: "YOUR_APPLE_MUSIC_PRIVATE_KEY_CONTENT" 
      # The 10-character Team ID from your Apple Developer account
      APPLE_MUSIC_TEAM_ID: "YOUR_APPLE_MUSIC_TEAM_ID"
      # The 10-character Key ID associated with the private key
      APPLE_MUSIC_KEY_ID: "YOUR_APPLE_MUSIC_KEY_ID"
      
      # --- Deemix Credentials ---
      DEEMIX_URL: "http://your-server-ip:6595"
      
      # --- YouTube Music/Data API Credentials ---
      # A standard Google/YouTube Data API Key for searching purposes
      YOUTUBE_DATA_API_KEY: "your_youtube_data_api_key"
      
      # --- Lidarr Credentials ---
      LIDARR_URL: "http://your-server-ip:8114" 
      LIDARR_API_KEY: "your_lidarr_api_key"

      SPOOTY_URL: "http://your-server-ip:8144"
      MUSIC_DOWNLOADS: /music_downloads
      MUSIC_DESTINATION: /music_destinations

    networks:
      - media-net

  sign-on-frontend:
    image: nginx:alpine
    container_name: sign-on-frontend
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    ports:
      - "8121:80"
    restart: unless-stopped
    networks:
      - media-net
    volumes:
      - /path/to/apps/landing-page-simple/backend/sign-on-page/pages:/usr/share/nginx/html:ro

  sign-on-backend:
    image: python:3.11-slim
    container_name: sign-on-backend
    working_dir: /app
    ports:
      - "8122:5000"
    restart: unless-stopped
    volumes:
      - /path/to/apps/landing-page-simple/backend/sign-on-page/backend:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             gunicorn --bind 0.0.0.0:5000 app:app"
    environment:

      # General
      SITE_PASSWORD: "changeme"
      PASS_HINT: "ask the admin"
      BACKEND_EXTERNAL_URL: "https://backend.yourdomain.com"
      WIKI_EXTERNAL_URL: "https://wiki.yourdomain.com"
      HOME_EXTERNAL_URL: "https://home.yourdomain.com"
      EMAIL_DOMAIN: "yourdomain.com"
      
      # Jellyfin
      JELLYFIN_INTERNAL_URL: "http://your-server-ip:8096"
      JELLYFIN_API_KEY: "your_jellyfin_api_key"
      JELLYFIN_EXTERNAL_URL: "https://yourdomain.com"
      
      # RomM
      ROMM_INTERNAL_URL: "http://your-server-ip:8113"
      ROMM_ADMIN_USER: "admin"
      ROMM_ADMIN_PASS: "your_romm_admin_password"
      ROMM_EXTERNAL_URL: "https://games.yourdomain.com"
      
      # BookLore
      BOOKLORE_INTERNAL_URL: "http://your-server-ip:6060"
      BOOKLORE_ADMIN_USER: "admin"
      BOOKLORE_ADMIN_PASS: "your_booklore_admin_password"
      BOOKLORE_EXTERNAL_URL: "https://books.yourdomain.com"
      
      # Synapse
      SYNAPSE_INTERNAL_URL: "http://your-server-ip:8129"
      SYNAPSE_ACCESS_TOKEN: "your_synapse_admin_access_token"
      SYNAPSE_DOMAIN: "matrix.yourdomain.com"
      SYNAPSE_EXTERNAL_URL: "https://messaging.yourdomain.com"

      # File Browser Quantum
      FILEBROWSER_INTERNAL_URL: "http://your-server-ip:8112"
      FILEBROWSER_EXTERNAL_URL: "https://storage.yourdomain.com"
      FILEBROWSER_API_KEY: "your_filebrowser_api_key"

      IMMICH_API_KEY: "your_immich_api_key"
      IMMICH_INTERNAL_URL: "http://your-server-ip:8138"
      IMMICH_EXTERNAL_URL: "https://photos.yourdomain.com"
    networks:
      - media-net

  script-runner:
    container_name: script-runner
    image: python:3.11-alpine
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             gunicorn --bind 0.0.0.0:8141 runner:app"
    networks:
      - media-net
    ports:
      - "8141:8141"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - SONARR_URL=http://your-server-ip:8989
      - SONARR_API_KEY=your_sonarr_api_key
    volumes:
      - /path/to/apps/landing-page-simple/backend/script-runner:/app
      - /path/to/apps/landing-page-simple/backend/script-runner/scripts:/scripts
      - /path/to/apps/landing-page-simple/backend/script-runner/logs:/logs
      - /path/to/apps/landing-page-simple/backend/script-runner/maps/show_map.json:/show_map.json:rw
      - /path/to/shows-source:/media-source:rw
      - /path/to/anime-destination:/anime-destination:rw
      - /path/to/tv-destination:/tv-destination:rw
      - /path/to/kidstv-destination:/kidstv-destination:rw
      - /path/to/music-source:/music-source:rw
      - /path/to/music-destination:/music-destination:rw
      - /path/to/comic-source:/comic-source:rw
      - /path/to/comic-destination:/comic-destination:rw
      - /path/to/manga-source:/manga-source:rw
      - /path/to/manga-destination:/manga-destination:rw
      - /path/to/webcomic-source:/webcomic-source:rw
      - /path/to/webcomic-destination:/webcomic-destination:rw
      - /path/to/novel-source:/novel-source:rw
      - /path/to/novel-destination:/novel-destination:rw
      - /path/to/movie-source:/movie-source:rw
      - /path/to/movie-destination:/movie-destination:rw
      - /path/to/musical-source:/musical-source:rw
      - /path/to/musical-destination:/musical-destination:rw
      - /path/to/youtube-source:/youtube-source:rw
      - /path/to/youtube-destination:/youtube-destination:rw

  hesk-middleware:
    image: node:20-alpine
    container_name: hesk-middleware
    working_dir: /app
    command: sh -c "npm install && node server.js"
    networks:
      - media-net
    ports:
      - "3001:3001"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - PORT=3001
      - HESK_URL=http://your-server-ip:8140
      - STATIC_DIR=/pages
    restart: unless-stopped
    volumes:
      - /path/to/apps/landing-page-simple/backend/ticket-middleware:/app
      - /path/to/apps/landing-page-simple/pages:/pages

networks:
  media-net:
    external: true
