<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<style>
*, *::before, *::after {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
}

:root {
    --bg-color: #0a0a0f;
    --accent: #5865f2;
    --accent-hover: #7289da;
    --text: #e6e6e6;
    --text-dim: #b3b3b3;
    --border: rgba(255, 255, 255, 0.1);
}

body {
    background: linear-gradient(180deg, #0a0a0f 0%, #0d0d16 40%, #11111a 100%);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    position: relative;
}

/* Content Container */
.content {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 500px;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Icon Animation */
.icon-wrapper {
    margin-bottom: 1.5rem;
}

.icon {
    font-size: 4rem;
    display: inline-block;
    animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

h1 { 
    color: var(--accent); 
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin: 0 0 1rem 0;
}

.subtitle {
    color: var(--text-dim);
    font-size: 1.1rem;
    margin: 0 0 2rem 0;
    line-height: 1.6;
}

/* Decorative Line */
.line-decoration {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2rem;
}

.line {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}

/* Status Badge */
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.2rem;
    background: rgba(88, 101, 242, 0.1);
    border: 1px solid rgba(88, 101, 242, 0.3);
    border-radius: 50px;
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 2rem;
}

.status-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}


/* Responsive */
@media (max-width: 500px) {
    h1 {
        font-size: 1.8rem;
    }
    
    .subtitle {
        font-size: 1rem;
    }
    
    .icon {
        font-size: 3rem;
    }
    
    .bg-blob {
        width: 200px;
        height: 200px;
    }
}
</style>
</head>
<body>

<!-- Background Blobs -->
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<div class="content">
    <div class="icon-wrapper">
        <span class="icon">🚧</span>
    </div>
    
    <h1>Coming Soon</h1>
    
    <div class="line-decoration">
        <span class="line"></span>
        <span class="dot"></span>
        <span class="line"></span>
    </div>
    
    <p class="subtitle">
        This feature is currently under development.<br>
        Check back soon for updates!
    </p>
    
    <div class="status-badge">
        <span class="status-dot"></span>
        <span>In Development</span>
    </div>
    
    <br>
    
</div>

</body>
</html>
